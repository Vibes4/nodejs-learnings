<h1>3Sum <span class="tag db">Two Pointers</span></h1>
<p>Given an integer array, return all unique triplets <code>[a, b, c]</code> that sum to zero. No triplet may be repeated.</p>
<p><strong>Complexity:</strong> <code>O(n^2)</code> time, <code>O(1)</code> extra space (excluding the sort and output).</p>
