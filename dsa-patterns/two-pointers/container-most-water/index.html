<h1>Container With Most Water <span class="tag db">Two Pointers</span></h1>
<p>Each array value is the height of a vertical line. Pick two lines that, with the x-axis, form a container holding the most water. Return that maximum area.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(1)</code> space.</p>
