<h1>Insert Interval <span class="tag db">Merge Intervals</span></h1>
<p>Given a sorted list of non-overlapping intervals and a new interval, insert it and merge any overlaps so the list stays sorted and non-overlapping.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(n)</code> space.</p>
