<h1>Koko Eating Bananas <span class="tag db">Modified Binary Search</span></h1>
<p>Koko eats bananas at a speed of <code>k</code> per hour, finishing at most one pile each hour. Given the piles and <code>h</code> hours, return the minimum integer <code>k</code> that lets her eat all bananas within <code>h</code> hours.</p>
<p><strong>Complexity:</strong> <code>O(n log m)</code> time (m = largest pile), <code>O(1)</code> space.</p>
