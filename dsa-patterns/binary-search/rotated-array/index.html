<h1>Search in Rotated Sorted Array <span class="tag db">Modified Binary Search</span></h1>
<p>A sorted array of distinct integers is rotated at an unknown pivot. Given a target, return its index, or <code>-1</code> if it is not present.</p>
<p><strong>Complexity:</strong> <code>O(log n)</code> time, <code>O(1)</code> space.</p>
