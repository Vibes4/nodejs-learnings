<h1>Find Peak Element <span class="tag db">Modified Binary Search</span></h1>
<p>A peak element is one that is strictly greater than its neighbours. Given an array where <code>nums[i] != nums[i + 1]</code>, return the index of any peak (treat out-of-bounds neighbours as negative infinity).</p>
<p><strong>Complexity:</strong> <code>O(log n)</code> time, <code>O(1)</code> space.</p>
