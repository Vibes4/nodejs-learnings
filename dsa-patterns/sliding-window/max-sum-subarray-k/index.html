<h1>Max Sum Subarray of Size K <span class="tag db">Sliding Window</span></h1>
<p>Given an array of numbers and a window size <code>k</code>, find the maximum sum of any contiguous subarray of exactly <code>k</code> elements.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(1)</code> space.</p>
