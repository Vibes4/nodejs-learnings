<h1>Longest Substring with At Most K Distinct Characters <span class="tag db">Sliding Window</span></h1>
<p>Given a string and an integer <code>k</code>, return the length of the longest substring that contains at most <code>k</code> distinct characters.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(k)</code> space.</p>
