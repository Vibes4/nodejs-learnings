<h1>Minimum Window Substring <span class="tag db">Sliding Window</span></h1>
<p>Given strings <code>s</code> and <code>t</code>, find the smallest substring of <code>s</code> that contains every character of <code>t</code> including multiplicity. Return <code>""</code> if no such window exists.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(charset)</code> space.</p>
