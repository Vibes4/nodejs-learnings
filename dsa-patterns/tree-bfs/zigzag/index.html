<h1>Zigzag (Spiral) Level Order Traversal <span class="tag db">Tree BFS</span></h1>
<p>Given the root of a binary tree, return its values level by level but alternating direction: left-to-right on the first level, right-to-left on the next, and so on.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(n)</code> space.</p>
