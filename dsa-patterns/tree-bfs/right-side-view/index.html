<h1>Binary Tree Right Side View <span class="tag db">Tree BFS</span></h1>
<p>Imagine standing on the right side of a binary tree; return the values of the nodes you can see, ordered from top to bottom (the last node of each level).</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(n)</code> space.</p>
