<h1>Daily Temperatures <span class="tag db">Monotonic Stack</span></h1>
<p>Given a list of daily temperatures, return an array where each entry is the number of days you must wait until a warmer temperature. If no warmer day exists, the entry is <code>0</code>.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(n)</code> space.</p>
