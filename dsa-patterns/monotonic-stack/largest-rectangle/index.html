<h1>Largest Rectangle in Histogram <span class="tag db">Monotonic Stack</span></h1>
<p>Given an array of bar heights (each bar of width <code>1</code>), find the area of the largest rectangle that fits entirely within the histogram.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(n)</code> space.</p>
