<h1>Linked List Cycle <span class="tag db">Fast &amp; Slow Pointers</span></h1>
<p>Detect whether a singly linked list contains a cycle. A slow pointer moves one step, a fast pointer two; if they ever meet, there is a cycle (Floyd's algorithm).</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(1)</code> space.</p>
