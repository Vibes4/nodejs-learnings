<h1>Start of Cycle <span class="tag db">Fast &amp; Slow Pointers</span></h1>
<p>If a singly linked list has a cycle, return the node where the cycle begins; otherwise return <code>null</code>. Detect the meeting point with Floyd's, then reset one pointer to the head and advance both one step at a time.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(1)</code> space.</p>
