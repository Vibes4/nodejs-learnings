<h1>Happy Number <span class="tag db">Fast &amp; Slow Pointers</span></h1>
<p>Repeatedly replace a number with the sum of the squares of its digits. The number is <em>happy</em> if this process reaches <code>1</code>; otherwise it loops forever. Detect the loop with fast/slow pointers over the sequence.</p>
<p><strong>Complexity:</strong> <code>O(log n)</code> time, <code>O(1)</code> space.</p>
