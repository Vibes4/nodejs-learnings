<h1>Find All Duplicates in an Array <span class="tag db">Cyclic Sort</span></h1>
<p>Given an array <code>nums</code> where every value is in the range <code>[1..n]</code> and some values appear twice, return all the values that appear twice.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(1)</code> extra space.</p>
