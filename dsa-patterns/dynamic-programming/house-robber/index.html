<h1>House Robber <span class="tag db">Dynamic Programming</span></h1>
<p>Given an array where each element is the money in a house, find the maximum amount you can rob without robbing two adjacent houses (the maximum sum of non-adjacent elements).</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(1)</code> space.</p>
