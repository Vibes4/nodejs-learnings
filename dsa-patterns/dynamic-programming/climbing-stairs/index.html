<h1>Climbing Stairs <span class="tag db">Dynamic Programming</span></h1>
<p>You can climb <code>1</code> or <code>2</code> steps at a time. Count the number of distinct ways to reach the top of a staircase with <code>n</code> stairs.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(1)</code> space.</p>
