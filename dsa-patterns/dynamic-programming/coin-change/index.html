<h1>Coin Change <span class="tag db">Dynamic Programming</span></h1>
<p>Given coin denominations and a target <code>amount</code>, return the fewest number of coins needed to make that amount, or <code>-1</code> if it cannot be made. Each coin may be used unlimited times.</p>
<p><strong>Complexity:</strong> <code>O(amount &times; coins)</code> time, <code>O(amount)</code> space.</p>
