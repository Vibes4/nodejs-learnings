<h1>Longest Increasing Subsequence <span class="tag db">Dynamic Programming</span></h1>
<p>Given an array of integers, return the length of the longest strictly increasing subsequence (elements need not be contiguous).</p>
<p><strong>Complexity:</strong> <code>O(n^2)</code> time, <code>O(n)</code> space. A patience-sorting / binary-search approach runs in <code>O(n log n)</code>.</p>
