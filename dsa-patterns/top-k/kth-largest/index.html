<h1>Kth Largest Element in an Array <span class="tag db">Top K Elements</span></h1>
<p>Given an integer array and a value <code>k</code>, return the <code>k</code>-th largest element. Maintain a min-heap of size <code>k</code> so its root is always the answer so far.</p>
<p><strong>Complexity:</strong> <code>O(n log k)</code> time, <code>O(k)</code> space.</p>
