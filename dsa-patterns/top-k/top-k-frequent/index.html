<h1>Top K Frequent Elements <span class="tag db">Top K Elements</span></h1>
<p>Given an integer array and a value <code>k</code>, return the <code>k</code> most frequent elements. Count frequencies, then bucket-sort by frequency so the answer is read off in linear time.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(n)</code> space.</p>
