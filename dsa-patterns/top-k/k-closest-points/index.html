<h1>K Closest Points to Origin <span class="tag db">Top K Elements</span></h1>
<p>Given an array of points on a plane and a value <code>k</code>, return the <code>k</code> points closest to the origin by Euclidean distance. A max-heap of size <code>k</code> keyed on squared distance keeps the closest points.</p>
<p><strong>Complexity:</strong> <code>O(n log k)</code> time, <code>O(k)</code> space.</p>
