<h1>Product of Array Except Self <span class="tag db">Prefix Sum</span></h1>
<p>Given an array, return an array where <code>output[i]</code> is the product of every element except <code>nums[i]</code>, computed without using division.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(1)</code> extra space (excluding the output array).</p>
