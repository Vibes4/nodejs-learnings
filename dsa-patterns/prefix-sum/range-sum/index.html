<h1>Range Sum Query - Immutable <span class="tag db">Prefix Sum</span></h1>
<p>Given an immutable array, precompute prefix sums so that <code>sumRange(i, j)</code> returns the sum of elements from index <code>i</code> to <code>j</code> inclusive in constant time.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> preprocessing, <code>O(1)</code> per query, <code>O(n)</code> space.</p>
