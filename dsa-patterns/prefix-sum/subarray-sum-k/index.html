<h1>Subarray Sum Equals K <span class="tag db">Prefix Sum</span></h1>
<p>Given an integer array and a target <code>k</code>, count the number of contiguous subarrays whose elements sum to exactly <code>k</code>.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(n)</code> space.</p>
