<h1>Word Search <span class="tag db">Backtracking</span></h1>
<p>Given an <code>m x n</code> board of characters and a word, return whether the word exists in the grid by following adjacent (up, down, left, right) cells. The same cell may not be used more than once.</p>
<p><strong>Complexity:</strong> <code>O(m · n · 4^L)</code> time (L = word length), <code>O(L)</code> space (recursion depth).</p>
