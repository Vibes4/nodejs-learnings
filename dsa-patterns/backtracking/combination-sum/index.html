<h1>Combination Sum <span class="tag db">Backtracking</span></h1>
<p>Given an array of distinct candidates and a target, return all unique combinations that sum to the target. Each candidate may be reused an unlimited number of times.</p>
<p><strong>Complexity:</strong> <code>O(n^(target/min))</code> time, <code>O(target/min)</code> space (recursion depth, excluding output).</p>
