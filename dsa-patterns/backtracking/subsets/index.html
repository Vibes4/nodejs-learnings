<h1>Subsets <span class="tag db">Backtracking</span></h1>
<p>Given an array of distinct integers, return all possible subsets (the power set). The solution set must not contain duplicate subsets.</p>
<p><strong>Complexity:</strong> <code>O(n · 2ⁿ)</code> time, <code>O(n)</code> space (recursion depth, excluding output).</p>
