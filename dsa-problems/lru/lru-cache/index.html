<h1>LRU Cache <span class="tag db">LRU Cache</span></h1>
<p>Design a cache with a fixed capacity supporting <code>get</code> and <code>put</code>; when full, evict the least recently used key. Uses a hash map plus a doubly linked list.</p>
<p><strong>Complexity:</strong> <code>O(1)</code> get/put time, <code>O(capacity)</code> space.</p>
