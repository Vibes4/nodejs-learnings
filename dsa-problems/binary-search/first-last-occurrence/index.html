<h1>First and Last Occurrence <span class="tag db">Binary Search</span></h1>
<p>In a sorted array with duplicates, find the index of the first and last occurrence of a target value (lower and upper bound). Each returns <code>-1</code> if absent.</p>
<p><strong>Complexity:</strong> <code>O(log n)</code> time, <code>O(1)</code> space.</p>
