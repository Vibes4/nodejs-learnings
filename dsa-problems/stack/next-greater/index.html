<h1>Next Greater Element <span class="tag db">Stack</span></h1>
<p>For each element, find the next element to its right that is strictly greater, using a monotonic decreasing stack of indices. Returns <code>-1</code> when none exists.</p>
<p><strong>Complexity:</strong> <code>O(n)</code> time, <code>O(n)</code> space.</p>
