<h1>Number of Islands <span class="tag db">Graphs</span></h1>
<p>Given a grid of '1' (land) and '0' (water), count the islands. Each landmass is flood-filled (sunk) so its cells aren't recounted.</p>
<p><strong>Complexity:</strong> <code>O(rows * cols)</code> time, <code>O(rows * cols)</code> space.</p>
